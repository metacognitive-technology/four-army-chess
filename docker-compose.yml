services:
  battle-chess:
    build: .
    container_name: battle-chess
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # Persist game saves, layouts, and attack stats across container restarts.
      # The production bundle (__dirname = /app/dist) resolves data to /app/dist/data.
      - battle-chess-data:/app/dist/data
    environment:
      - NODE_ENV=production
      - PORT=5000

volumes:
  battle-chess-data:
